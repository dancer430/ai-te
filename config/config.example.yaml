# 测试 Agent 配置文件示例
# 复制此文件为 config.yaml 并修改配置

# ===================
# AI 配置
# ===================

ai:
  # AI 提供商：anthropic（Claude）或 glm（智谱）
  provider: "anthropic"

  # API 密钥（必填）
  # Anthropic: 也可通过环境变量 ANTHROPIC_API_KEY 设置
  # GLM: 也可通过环境变量 ZHIPUAI_API_KEY 设置
  api_key: "your-api-key"

  # 模型名称（可选，留空使用默认模型）
  # Anthropic 默认: claude-sonnet-4-20250514
  # GLM 默认: glm-4-plus
  model: ""

# ===================
# 被测系统配置
# ===================

target:
  # 起始 URL
  url: "http://internal-app.local:8080"

  # Bearer Token 认证（可选）
  # 如果设置为空字符串或不设置，启动时会提示输入
  bearer_token: ""

# 代理配置（可选）
# 支持 http://、https://、socks5:// 协议
proxy: ""

# 浏览器配置
browser:
  # 无头模式
  headless: false

  # 视口大小
  viewport:
    width: 1280
    height: 720

  # 浏览器语言
  locale: "zh-CN"

# ===================
# 运行时变量
# ===================
# 在测试用例中使用 ${变量名} 或 {{变量名}} 引用
# 例如: ${search.keyword} 会被替换为下面定义的值

# 搜索相关变量
search:
  keyword: "test"

# 你可以添加任意自定义变量
# 示例:
# user:
#   name: "测试用户"
#   email: "test@example.com"
#   phone: "13800138000"
#
# api:
#   base_url: "http://api.example.com"
#   version: "v1"
